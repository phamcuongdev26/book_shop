services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: bookshop123
      MYSQL_DATABASE: book_shop_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/data.sql:/docker-entrypoint-initdb.d/01_data.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pbookshop123"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    image: cuongne26/bookshop:latest
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://db:3306/book_shop_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&useUnicode=true
      DB_USERNAME: root
      DB_PASSWORD: bookshop123
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
